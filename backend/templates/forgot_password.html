<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — ApproachNote</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/static/images/app_icon.svg?v=2">
  <style>
    :root {
      --text: #1a1a1a; --muted: #555; --accent: #1f3a5f;
      --rule: #e5e5e5; --bg: #fdfdfb; --err: #c0392b; --ok: #1e7e45;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text); background: var(--bg); line-height: 1.6; margin: 0;
    }
    main { max-width: 420px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo img { width: 220px; max-width: 80%; height: auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.4rem; letter-spacing: -0.01em; }
    p.sub { color: var(--muted); margin-top: 0; }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin: 1rem 0 0.35rem; }
    input[type=email] {
      width: 100%; padding: 0.7rem 0.8rem; font-size: 1rem;
      border: 1px solid var(--rule); border-radius: 8px; background: #fff;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; margin-top: 1.5rem; padding: 0.8rem; font-size: 1rem; font-weight: 600;
      color: #fff; background: var(--accent); border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .field-err { color: var(--err); font-size: 0.8rem; margin-top: 0.4rem; min-height: 1rem; }
    .msg { margin-top: 1.25rem; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.95rem; display: none; }
    .msg.error { background: #fdecea; color: var(--err); display: block; }
    .msg.ok { background: #eaf7ef; color: var(--ok); display: block; }
    a { color: var(--accent); }
    footer { text-align: center; margin-top: 2.5rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
<main>
  <div class="logo"><img src="/static/images/email-logo.png" alt="ApproachNote"></div>

  <div id="form-card">
    <h1>Forgot your password?</h1>
    <p class="sub">Enter your email and we'll send you a link to reset it.</p>

    <form id="forgot-form">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="your@email.com">
      <div class="field-err" id="field-err"></div>
      <button type="submit" id="submit">Send reset link</button>
    </form>
  </div>

  <div class="msg" id="msg"></div>

  <footer>&copy; 2026 ApproachNote</footer>
</main>

<script>
  (function () {
    var msg = document.getElementById('msg');
    var card = document.getElementById('form-card');
    var fieldErr = document.getElementById('field-err');

    function show(kind, text) {
      msg.className = 'msg ' + kind;
      msg.textContent = text;
    }

    document.getElementById('forgot-form').addEventListener('submit', function (e) {
      e.preventDefault();
      fieldErr.textContent = '';
      var email = document.getElementById('email').value.trim();
      if (!email) { fieldErr.textContent = 'Please enter your email.'; return; }

      var btn = document.getElementById('submit');
      btn.disabled = true; btn.textContent = 'Sending…';

      fetch('/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      }).then(function (r) {
        return r.json().then(function (data) { return { ok: r.ok, status: r.status, data: data }; });
      }).then(function (res) {
        if (res.ok) {
          card.style.display = 'none';
          show('ok', 'If that email is associated with an account, a password reset link is on its way. The link expires in 1 hour.');
        } else {
          btn.disabled = false; btn.textContent = 'Send reset link';
          var m = (res.data && res.data.error) || 'Something went wrong. Please try again.';
          show('error', m);
        }
      }).catch(function () {
        btn.disabled = false; btn.textContent = 'Send reset link';
        show('error', 'Network error. Please check your connection and try again.');
      });
    });
  })();
</script>
</body>
</html>
