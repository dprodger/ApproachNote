<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — ApproachNote</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="/static/images/app_icon.svg?v=2">
  <style>
    :root {
      --text: #1a1a1a; --muted: #555; --accent: #1f3a5f;
      --rule: #e5e5e5; --bg: #fdfdfb; --err: #c0392b; --ok: #1e7e45;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text); background: var(--bg); line-height: 1.6; margin: 0;
    }
    main { max-width: 420px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo img { width: 220px; max-width: 80%; height: auto; }
    h1 { font-size: 1.5rem; margin: 0 0 0.4rem; letter-spacing: -0.01em; }
    p.sub { color: var(--muted); margin-top: 0; }
    label { display: block; font-size: 0.9rem; color: var(--muted); margin: 1rem 0 0.35rem; }
    input[type=password], input[type=text], input[type=email] {
      width: 100%; padding: 0.7rem 0.8rem; font-size: 1rem;
      border: 1px solid var(--rule); border-radius: 8px; background: #fff;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .reveal { display: flex; align-items: center; margin-top: 0.6rem; font-size: 0.85rem; color: var(--muted); }
    .reveal input { width: auto; margin-right: 0.4rem; }
    button {
      width: 100%; margin-top: 1.5rem; padding: 0.8rem; font-size: 1rem; font-weight: 600;
      color: #fff; background: var(--accent); border: none; border-radius: 8px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .field-err { color: var(--err); font-size: 0.8rem; margin-top: 0.4rem; min-height: 1rem; }
    .msg { margin-top: 1.25rem; padding: 0.8rem 1rem; border-radius: 8px; font-size: 0.95rem; display: none; }
    .msg.error { background: #fdecea; color: var(--err); display: block; }
    .msg.ok { background: #eaf7ef; color: var(--ok); display: block; }
    .msg a { color: inherit; font-weight: 600; }
    .app-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; }
    a { color: var(--accent); }
    footer { text-align: center; margin-top: 2.5rem; color: var(--muted); font-size: 0.8rem; }
  </style>
</head>
<body>
<main>
  <div class="logo"><img src="/static/images/email-logo.png" alt="ApproachNote"></div>

  <div id="form-card">
    <h1>Reset your password</h1>
    <p class="sub">Enter a new password for your account.</p>

    <form id="reset-form" autocomplete="off">
      <label for="password">New password</label>
      <input type="password" id="password" autocomplete="new-password" placeholder="At least 8 characters">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" autocomplete="new-password" placeholder="Re-enter password">
      <div class="field-err" id="field-err"></div>
      <label class="reveal"><input type="checkbox" id="reveal">Show passwords</label>
      <button type="submit" id="submit">Reset password</button>
    </form>

    <div class="app-link" id="app-link-wrap">
      Have the app installed? <a id="app-open" href="#">Open in the ApproachNote app</a>
    </div>
  </div>

  <div class="msg" id="msg"></div>

  <footer>&copy; 2026 ApproachNote</footer>
</main>

<script>
  (function () {
    var token = new URLSearchParams(window.location.search).get('token');
    var msg = document.getElementById('msg');
    var card = document.getElementById('form-card');
    var fieldErr = document.getElementById('field-err');
    var appOpen = document.getElementById('app-open');

    function show(kind, html) {
      msg.className = 'msg ' + kind;
      msg.innerHTML = html;
    }

    // Carry the token through the custom scheme for users who have the app.
    if (token) {
      appOpen.href = 'approachnote://auth/reset-password?token=' + encodeURIComponent(token);
    } else {
      document.getElementById('app-link-wrap').style.display = 'none';
    }

    if (!token) {
      card.style.display = 'none';
      show('error', 'This reset link is missing its token. <a href="/forgot-password">Request a new password reset link.</a>');
      return;
    }

    document.getElementById('reveal').addEventListener('change', function (e) {
      var t = e.target.checked ? 'text' : 'password';
      document.getElementById('password').type = t;
      document.getElementById('confirm').type = t;
    });

    document.getElementById('reset-form').addEventListener('submit', function (e) {
      e.preventDefault();
      fieldErr.textContent = '';
      var pw = document.getElementById('password').value;
      var cf = document.getElementById('confirm').value;
      if (pw.length < 8) { fieldErr.textContent = 'Password must be at least 8 characters.'; return; }
      if (pw !== cf) { fieldErr.textContent = 'Passwords do not match.'; return; }

      var btn = document.getElementById('submit');
      btn.disabled = true; btn.textContent = 'Resetting…';

      fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: token, password: pw })
      }).then(function (r) {
        return r.json().then(function (data) { return { ok: r.ok, status: r.status, data: data }; });
      }).then(function (res) {
        if (res.ok) {
          card.style.display = 'none';
          show('ok', 'Your password has been reset. You can now sign in with your new password in the ApproachNote app.');
        } else {
          btn.disabled = false; btn.textContent = 'Reset password';
          if (res.status === 401) {
            show('error', 'This reset link is invalid or has expired. <a href="/forgot-password">Request a new one.</a>');
          } else {
            var m = (res.data && res.data.error) || 'Something went wrong. Please try again.';
            show('error', m);
          }
        }
      }).catch(function () {
        btn.disabled = false; btn.textContent = 'Reset password';
        show('error', 'Network error. Please check your connection and try again.');
      });
    });
  })();
</script>
</body>
</html>
